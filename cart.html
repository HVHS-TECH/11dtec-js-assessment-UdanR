<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="CSS/Header_Nav.css">
    <link rel="stylesheet" href="CSS/Cart_Item_Ordering.css">
    <link rel="stylesheet" href="CSS/Receipt.css">
<title>Cart - Street Bites</title>
<style>html{
scroll-behavior: smooth;
}</style>
</head>
<body>
    <header>
        <h1 href="index.html" class="Logo">Street Bites</h1>
        <div class="search-container">
            <input type="text" class="Search-Bar" id="searchBar" placeholder="Search Food">
            <div class="suggestions" id="suggestions"></div>
            <img src="search.png" class="search-icon" alt="search-icon">
        </div>
        <div class="shopping-cart">
            <a href="cart.html"><img src="shopping-cart.png" class="shopping-cart-icon" id="shopping-cart-icon"></a>
            <div class="shopping-cart-price" id="Shopping-cart-price">$0.00</div>
        </div>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
    </nav>
    <main>
        <h1 class="Header">Cart</h1>
        <div class="Receipt" id="Receipt_Area">
            <div class="receipt_Top">
                <h1 class="receipt_logo">Street Bites</h1>
                <h2 class="receipt_date">2026</h2>
                <h2 class="receipt_name">Mr. Potato</h2>
            </div>
            <div class="receipt_Chosen_Items" id="receipt_Chosen_Items_Area">
                <div class="receipt_Chosen_Items_Info">
                    <h2 class="receipt_Chosen_Items_Name">Burguer</h2>
                    <h2 class="receipt_Chosen_Items_Price">$5</h2>
                </div>
                <div class="receipt_Chosen_Items_Quantity">
                    <h2 id="receipt_Chosen_Items_Quantity_Area">2</h2>
                </div>
                <div class="receipt_Chosen_Items_Total_Outcome">
                    <h2 id="receipt_Chosen_Items_Total_Price">$10</h2>
                </div>
            </div>
            <div class="receipt_Bottom">
                <div class="receipt_Total_Price">
                    <h2>Total:</h2>
                    <h2>$10</h2>
                </div>
                <div class="receipt_Chosen_Given_Amount">
                    <h2>Given Amount :</h2>
                    <h2>$20</h2>
                </div>
                <div class="receipt_Chosen_Change">
                    <h2>Change :</h2>
                    <h2>$10</h2>
                </div>
            </div>
        </div>

        <div class="cart_Chosen_Items" id="choosen_Cart_Output">
            <div class="item-1">
                <div class="chosen_Item_IMG">
                    <img src="Items_IMG/BBQ_Bacon_Burger.jpeg" alt="BBQ Bacone Burguer">
                </div>
                <div class="chosen_Item_Info">
                    <div class="Item_Details">
                        <h2 class="item_Name">BBQ Bacon Burger</h2>
                        <h2 class="item_Price">$5</h2>
                    </div>
                    <div class="Item_Quantity">
                        <input type="number" value="2" id="item_quantity_101" class="item_quantity">
                    </div>
                    <div class="Item_Total">
                        <button value="101" onclick="Remove_From_Cart_Function(this.value)" class="Remove_From_Cart_Button">Remove</button>
                        <h2 class="Chosen_Item_Total" id="chosen_Item_Total_Price">$10</h2>
                    </div>
                </div>
            </div>
            <div class="item-1">
                <div class="chosen_Item_IMG">
                    <img src="Items_IMG/BBQ_Bacon_Burger.jpeg" alt="BBQ Bacone Burguer">
                </div>
                <div class="chosen_Item_Info">
                    <div class="Item_Details">
                        <h2 class="item_Name">BBQ Bacon Burger</h2>
                        <h2 class="item_Price">$5</h2>
                    </div>
                    <div class="Item_Quantity">
                        <input type="number" value="2" id="item_quantity_101" class="item_quantity">
                    </div>
                    <div class="Item_Total">
                        <button value="101" onclick="Remove_From_Cart_Function(this.value)" class="Remove_From_Cart_Button">Remove</button>
                        <h2 class="Chosen_Item_Total" id="chosen_Item_Total_Price">$10</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="cart_Chosen_Items" id="cart_Total_Output">
            <div class="Checkingout">
                <div class="chosen_Item_Info">
                    <div class="Total_Details">
                        <h2>UserName - </h2> 
                        <input type="text" placeholder="UserName" id="User_Name" required>
                        <h2>How much money do you have?</h2>
                        <input type="number" min="0" value="" placeholder="How much money do you have" id="Available_Money" required>
                    </div>
                    <div class="Item_Total">
                        <h2 class="Chosen_Item_Total" id="checkout_Total_Price">$20</h2>
                        <button onclick="Check_Out()" id="Check_Out_Button">Check Out</button>
                    </div>
                </div>
            </div>
        </div>
  </main>
<script src="JS/Cart.js"></script>
</body>

</html>
